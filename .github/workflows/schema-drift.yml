name: schema-drift-check

# Weekly upstream schema drift check. Detects two things:
#   1. Drift in vendored schemas: a tracked schema changed upstream -> refresh
#      and open a PR with the updated files.
#   2. New upstream schemas: files added under OMH schema/omh/ or IEEE schemas/
#      since the pinned ref that we don't vendor -> surface them in the PR body
#      and open/update a tracking issue (they are NOT auto-vendored; vendoring
#      is a deliberate decision — see the body-weight/pulmonary PRs for the
#      pattern).
#
# This workflow is intended to run on the the-commons-project fork, where org
# policy allows Actions to create PRs (the jupyterhealth org forbids it; the
# copy of this workflow there is disabled in the Actions UI).

on:
  schedule:
    - cron: '0 9 * * 1'  # Monday 9am UTC
  workflow_dispatch: {}   # manual trigger for testing

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  check:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'
          cache: pip

      - name: Install
        run: pip install -e .

      - name: Check for drift and refresh
        id: drift
        run: |
          PINNED_OMH=$(python -c "import json; print(json.loads(open('omh_shim/schemas/_pinned.json').read())['omh']['ref'])")
          PINNED_IEEE=$(python -c "import json; print(json.loads(open('omh_shim/schemas/_pinned.json').read())['ieee']['ref'])")

          UPSTREAM_OMH=$(curl -fsSL https://api.github.com/repos/openmhealth/schemas/git/refs/heads/main | python -c "import sys,json; print(json.load(sys.stdin)['object']['sha'])")
          UPSTREAM_IEEE=$(curl -fsSL "https://opensource.ieee.org/api/v4/projects/omh%2F1752/repository/tags?per_page=1" -H "User-Agent: omh-shim-drift-check/1.0" | python -c "import sys,json; print(json.load(sys.stdin)[0]['name'])")

          echo "pinned_omh=$PINNED_OMH" >> "$GITHUB_OUTPUT"
          echo "pinned_ieee=$PINNED_IEEE" >> "$GITHUB_OUTPUT"
          echo "upstream_omh=$UPSTREAM_OMH" >> "$GITHUB_OUTPUT"
          echo "upstream_ieee=$UPSTREAM_IEEE" >> "$GITHUB_OUTPUT"

          # Detect schemas ADDED upstream since the pinned ref. These are not
          # tracked by refresh_schemas.py, so the refresh below cannot see
          # them — without this check they would land upstream silently.
          # Detection is best-effort (|| true): a compare-API hiccup must not
          # break the drift check itself.
          # Note: the GitHub compare API caps the files array at 300 entries
          # (https://docs.github.com/en/rest/commits/commits#compare-two-commits);
          # a weekly diff of the OMH repo stays far below that in practice.
          NEW_OMH=""
          if [ "$PINNED_OMH" != "$UPSTREAM_OMH" ]; then
            NEW_OMH=$(curl -fsSL "https://api.github.com/repos/openmhealth/schemas/compare/${PINNED_OMH}...${UPSTREAM_OMH}" | python -c "import sys,json; print('\n'.join(f['filename'].removeprefix('schema/omh/') for f in json.load(sys.stdin).get('files',[]) if f['status']=='added' and f['filename'].startswith('schema/omh/') and f['filename'].endswith('.json')))" || true)
          fi
          NEW_IEEE=""
          if [ "$PINNED_IEEE" != "$UPSTREAM_IEEE" ]; then
            NEW_IEEE=$(curl -fsSL "https://opensource.ieee.org/api/v4/projects/omh%2F1752/repository/compare?from=${PINNED_IEEE}&to=${UPSTREAM_IEEE}" -H "User-Agent: omh-shim-drift-check/1.0" | python -c "import sys,json; print('\n'.join(d['new_path'].removeprefix('schemas/') for d in json.load(sys.stdin).get('diffs',[]) if d.get('new_file') and d['new_path'].startswith('schemas/') and d['new_path'].endswith('.json')))" || true)
          fi

          NEW_SCHEMAS=""
          if [ -n "$NEW_OMH" ]; then
            NEW_SCHEMAS="$(echo "$NEW_OMH" | sed 's/^/OMH: /')"
          fi
          if [ -n "$NEW_IEEE" ]; then
            NL=$'\n'
            IEEE_LINES="$(echo "$NEW_IEEE" | sed 's/^/IEEE: /')"
            NEW_SCHEMAS="${NEW_SCHEMAS:+$NEW_SCHEMAS$NL}$IEEE_LINES"
          fi

          echo "new_schemas<<EOF" >> "$GITHUB_OUTPUT"
          echo "$NEW_SCHEMAS" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          if [ -n "$NEW_SCHEMAS" ]; then
            echo "has_new=true" >> "$GITHUB_OUTPUT"
            echo "New upstream schemas detected:"
            echo "$NEW_SCHEMAS"
          else
            echo "has_new=false" >> "$GITHUB_OUTPUT"
          fi

          ARGS=""
          if [ "$PINNED_OMH" != "$UPSTREAM_OMH" ]; then
            ARGS="$ARGS --omh-ref $UPSTREAM_OMH"
          fi
          if [ "$PINNED_IEEE" != "$UPSTREAM_IEEE" ]; then
            ARGS="$ARGS --ieee-ref $UPSTREAM_IEEE"
          fi

          if [ -z "$ARGS" ]; then
            echo "No drift detected."
            echo "drift=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Drift detected. Running refresh..."
          echo "y" | python tools/refresh_schemas.py $ARGS

          if git diff --quiet omh_shim/schemas/; then
            echo "Upstream refs moved but no vendored files changed."
            echo "drift=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "drift=true" >> "$GITHUB_OUTPUT"
          CHANGED_FILES=$(git diff --name-only omh_shim/schemas/)
          echo "changed_files<<EOF" >> "$GITHUB_OUTPUT"
          echo "$CHANGED_FILES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Commit and push
        if: steps.drift.outputs.drift == 'true'
        env:
          PINNED_OMH: ${{ steps.drift.outputs.pinned_omh }}
          PINNED_IEEE: ${{ steps.drift.outputs.pinned_ieee }}
          UPSTREAM_OMH: ${{ steps.drift.outputs.upstream_omh }}
          UPSTREAM_IEEE: ${{ steps.drift.outputs.upstream_ieee }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B automated/schema-drift
          git add -A omh_shim/schemas/
          git commit -m "chore(schemas): update vendored schemas

          OMH: ${PINNED_OMH} -> ${UPSTREAM_OMH}
          IEEE: ${PINNED_IEEE} -> ${UPSTREAM_IEEE}"
          git push -f origin automated/schema-drift

      - name: Open or update PR
        if: steps.drift.outputs.drift == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PINNED_OMH: ${{ steps.drift.outputs.pinned_omh }}
          PINNED_IEEE: ${{ steps.drift.outputs.pinned_ieee }}
          UPSTREAM_OMH: ${{ steps.drift.outputs.upstream_omh }}
          UPSTREAM_IEEE: ${{ steps.drift.outputs.upstream_ieee }}
          CHANGED_FILES: ${{ steps.drift.outputs.changed_files }}
          NEW_SCHEMAS: ${{ steps.drift.outputs.new_schemas }}
        run: |
          BODY=$(cat <<EOF
          ## Schema drift detected

          | Source | Old ref | New ref |
          |---|---|---|
          | OMH | \`${PINNED_OMH}\` | \`${UPSTREAM_OMH}\` |
          | IEEE | \`${PINNED_IEEE}\` | \`${UPSTREAM_IEEE}\` |

          ### Changed files

          \`\`\`
          ${CHANGED_FILES}
          \`\`\`

          ### What to do

          1. Review the **Files changed** tab for breaking changes
          2. If CI is green, the change is additive — squash-merge
          3. If CI is red, a converter needs updating to match the new schema

          ### Upstream diffs

          - [OMH](https://github.com/openmhealth/schemas/compare/${PINNED_OMH}..${UPSTREAM_OMH})
          - [IEEE](https://opensource.ieee.org/omh/1752/-/compare/${PINNED_IEEE}...${UPSTREAM_IEEE})
          EOF
          )

          if [ -n "$NEW_SCHEMAS" ]; then
            BODY="$BODY

          ### ⚠️ New upstream schemas (not vendored)

          Added upstream since the pinned ref and NOT tracked by
          \`tools/refresh_schemas.py\` — merging this PR bumps the pin past
          them, so decide now whether to vendor (a tracking issue is also
          opened/updated by this run):

          \`\`\`
          ${NEW_SCHEMAS}
          \`\`\`"
          fi

          EXISTING=$(gh pr list --head automated/schema-drift --state open --json number -q '.[0].number')
          if [ -n "$EXISTING" ]; then
            gh pr edit "$EXISTING" --body "$BODY"
            echo "Updated existing PR #$EXISTING"
          else
            gh pr create \
              --head automated/schema-drift \
              --base main \
              --title "chore(schemas): upstream drift detected" \
              --body "$BODY" \
              --assignee surfdoc \
              --label schema-drift
            echo "Created new PR"
          fi

      - name: Open or update issue for new upstream schemas
        if: steps.drift.outputs.has_new == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PINNED_OMH: ${{ steps.drift.outputs.pinned_omh }}
          PINNED_IEEE: ${{ steps.drift.outputs.pinned_ieee }}
          NEW_SCHEMAS: ${{ steps.drift.outputs.new_schemas }}
        run: |
          TITLE="chore(schemas): new upstream schemas detected (not vendored)"
          BODY=$(cat <<EOF
          The weekly drift check found schemas added upstream since the pinned
          refs (OMH \`${PINNED_OMH}\`, IEEE \`${PINNED_IEEE}\`) that omh-shim
          does not vendor:

          \`\`\`
          ${NEW_SCHEMAS}
          \`\`\`

          They are NOT auto-vendored — once the pin moves past them this
          detection goes quiet, so this issue is the durable record. To vendor
          one, follow the pattern from the body-weight / pulmonary PRs:

          1. Add it to \`TARGETS\` (and any new utility refs to
             \`OMH_UTILITY_TARGETS\`) in \`tools/refresh_schemas.py\`
          2. Run \`python tools/refresh_schemas.py\` to fetch it at the pinned ref
          3. Add \`_FILENAMES\`, \`SERVED_SAMPLES\`, and \`SERVED_NO_CONVERTER\`
             entries; the offline \$ref-closure test catches missing refs
          4. CHANGELOG entry + MINOR version bump

          If a schema is deliberately not vendored, note that here and close.
          EOF
          )

          EXISTING=$(gh issue list --state open --label schema-drift --search "new upstream schemas detected in:title" --json number -q '.[0].number')
          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --body "$BODY"
            echo "Commented on existing issue #$EXISTING"
          else
            gh issue create --title "$TITLE" --body "$BODY" --assignee surfdoc --label schema-drift
            echo "Created new issue"
          fi
